<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProBooth Admin</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f0f;
            color: #d0d0d0;
            padding: 30px;
            min-height: 100vh;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .sub {
            color: #555;
            font-size: 13px;
            margin-bottom: 28px;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 28px;
            max-width: 420px;
        }

        input {
            display: block;
            width: 100%;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 7px;
            padding: 11px 14px;
            color: #e0e0e0;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        input:focus {
            border-color: #444;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 7px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            transition: opacity .15s;
        }

        button:hover {
            opacity: .82;
        }

        .btn-primary {
            background: #253355;
            color: #fff;
        }

        .btn-upgrade {
            background: #1a3c2e;
            color: #6ee7b7;
            padding: 5px 13px;
            font-size: 12px;
        }

        .btn-downgrade {
            background: #3d1010;
            color: #fca5a5;
            padding: 5px 13px;
            font-size: 12px;
        }

        .btn-muted {
            background: #1e1e1e;
            color: #666;
            border: 1px solid #2a2a2a;
        }

        /* Tabs styling */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }

        .tab-btn {
            background: transparent;
            color: #888;
            border: 1px solid transparent;
            padding: 8px 16px;
        }

        .tab-btn.active {
            background: #1a1a1a;
            color: #fff;
            border-color: #333;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .stat {
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 9px;
            padding: 14px 22px;
            min-width: 90px;
        }

        .stat-l {
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-bottom: 4px;
        }

        .stat-v {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .stat-v.g {
            color: #34d399;
        }

        .stat-v.d {
            color: #ef4444;
        }

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .search-row input {
            margin: 0;
            flex: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead th {
            text-align: left;
            padding: 9px 12px;
            border-bottom: 1px solid #1e1e1e;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #555;
        }

        tbody td {
            padding: 12px 12px;
            border-bottom: 1px solid #171717;
            vertical-align: middle;
        }

        tbody tr:hover td {
            background: #141414;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .b-free {
            background: #1c1c1c;
            color: #555;
            border: 1px solid #2a2a2a;
        }

        .b-paid {
            background: rgba(52, 211, 153, .1);
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, .3);
        }

        .note-input {
            width: 160px;
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 5px;
            padding: 5px 9px;
            color: #888;
            font-size: 12px;
            display: inline-block;
            margin: 0;
        }

        .mono {
            font-family: monospace;
            font-size: 11px;
            color: #888;
        }

        .fw-bold {
            font-weight: bold;
            color: #d0d0d0;
        }

        .muted {
            font-size: 12px;
            color: #555;
        }

        .acts {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .err {
            color: #ef4444;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #253355;
            color: #fff;
            padding: 12px 20px;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .5);
            display: none;
            z-index: 999;
        }
    </style>
</head>

<body>

    <div id="loginSection">
        <div class="card">
            <h1>ProBooth Admin</h1>
            <p class="sub">Enter credentials to manage the system.</p>
            <input type="text" id="apiBase" placeholder="API Base URL (e.g. https://api.polo-booth.com)">
            <input type="password" id="adminSecret" placeholder="Admin Secret"
                onkeypress="if(event.key==='Enter') doLogin()">
            <button class="btn-primary" onclick="doLogin()" style="width:100%;">Login</button>
            <p class="err" id="loginErr"></p>
        </div>
    </div>

    <div id="mainSection" style="display:none;">
        <div class="topbar">
            <div class="stat">
                <div class="stat-l" id="stat1L">Total</div>
                <div class="stat-v" id="stat1V">—</div>
            </div>
            <div class="stat">
                <div class="stat-l" id="stat2L">Free</div>
                <div class="stat-v d" id="stat2V">—</div>
            </div>
            <div class="stat">
                <div class="stat-l" id="stat3L">Paid</div>
                <div class="stat-v g" id="stat3V">—</div>
            </div>
            <button class="btn-muted" onclick="refreshData()" style="margin-left:auto;">↻ Refresh Data</button>
            <button class="btn-muted" onclick="doLogout()">Logout</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btnTabUsers" onclick="switchTab('users')">Users</button>
            <button class="tab-btn" id="btnTabInvites" onclick="switchTab('invites')">Invite Codes</button>
        </div>

        <div id="viewUsers">
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="Filter by email…" oninput="filterTable()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>UID</th>
                        <th>Tier</th>
                        <th>Joined</th>
                        <th>Note</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>

        <div id="viewInvites" style="display:none;">
            <div class="search-row">
                <input type="text" id="searchInvites" placeholder="Filter codes or UID…" oninput="filterInvites()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Invite Code</th>
                        <th>Status</th>
                        <th>Used By UID</th>
                        <th>Created</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="inviteTable"></tbody>
            </table>
        </div>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        let API = '', SECRET = '';
        let allUsers = [];
        let allInvites = [];
        let currentTab = 'users';

        async function doLogin() {
            API = (document.getElementById('apiBase').value || '').trim().replace(/\/$/, '');
            SECRET = (document.getElementById('adminSecret').value || '').trim();
            const errEl = document.getElementById('loginErr');
            errEl.style.display = 'none';

            try {
                // Fetch users first to validate secret
                const uOk = await fetchUsers();
                if (uOk) {
                    await fetchInvites();
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('mainSection').style.display = 'block';
                    updateStats();
                } else {
                    errEl.textContent = 'Authentication failed or no access.';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                errEl.textContent = 'Connection error: ' + e.message;
                errEl.style.display = 'block';
            }
        }

        async function refreshData() {
            await fetchUsers();
            await fetchInvites();
            updateStats();
            showToast('✅ Data refreshed');
        }

        async function fetchUsers() {
            const resp = await fetch(`${API}/api/admin/users`, { headers: { 'x-admin-secret': SECRET } });
            if (!resp.ok) return false;
            const data = await resp.json();
            if (data.success) {
                allUsers = data.users.sort((a, b) => a.email.localeCompare(b.email));
                renderTable(allUsers);
                return true;
            }
            return false;
        }

        async function fetchInvites() {
            const resp = await fetch(`${API}/api/admin/invites`, { headers: { 'x-admin-secret': SECRET } });
            if (!resp.ok) return false;
            const data = await resp.json();
            if (data.success) {
                allInvites = data.invites.sort((a, b) => {
                    // Sort available first, then by date created
                    if (a.used !== b.used) return a.used ? 1 : -1;
                    return b.createdAt.localeCompare(a.createdAt);
                });
                renderInvites(allInvites);
                return true;
            }
            return false;
        }

        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'users') {
                document.getElementById('viewUsers').style.display = 'block';
                document.getElementById('viewInvites').style.display = 'none';
                document.getElementById('btnTabUsers').classList.add('active');
                document.getElementById('btnTabInvites').classList.remove('active');
            } else {
                document.getElementById('viewUsers').style.display = 'none';
                document.getElementById('viewInvites').style.display = 'block';
                document.getElementById('btnTabUsers').classList.remove('active');
                document.getElementById('btnTabInvites').classList.add('active');
            }
            updateStats();
        }

        function updateStats() {
            if (currentTab === 'users') {
                document.getElementById('stat1L').textContent = 'Total Users';
                document.getElementById('stat1V').textContent = allUsers.length;
                document.getElementById('stat2L').textContent = 'Free';
                document.getElementById('stat2V').textContent = allUsers.filter(u => u.tier !== 'paid').length;
                document.getElementById('stat2V').className = 'stat-v d'; // red
                document.getElementById('stat3L').textContent = 'Paid';
                document.getElementById('stat3V').textContent = allUsers.filter(u => u.tier === 'paid').length;
                document.getElementById('stat3V').className = 'stat-v g'; // green
            } else {
                document.getElementById('stat1L').textContent = 'Total Codes';
                document.getElementById('stat1V').textContent = allInvites.length;
                document.getElementById('stat2L').textContent = 'Used';
                document.getElementById('stat2V').textContent = allInvites.filter(i => i.used).length;
                document.getElementById('stat2V').className = 'stat-v d'; // red
                document.getElementById('stat3L').textContent = 'Available';
                document.getElementById('stat3V').textContent = allInvites.filter(i => !i.used).length;
                document.getElementById('stat3V').className = 'stat-v g'; // green
            }
        }

        /* --- USERS LOGIC --- */
        function renderTable(users) {
            const tbody = document.getElementById('userTable');
            tbody.innerHTML = '';
            users.forEach(u => {
                const joined = u.createdAt ? new Date(u.createdAt).toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' }) : '—';

                // NEW: Handle expiration display and local auto-downgrade
                let isPaid = u.tier === 'paid';
                let expHtml = '';
                if (isPaid && u.expiresAt) {
                    const expDate = new Date(u.expiresAt);
                    if (new Date() > expDate) {
                        isPaid = false; // Expired! Treat as free locally
                        u.tier = 'free';
                    } else {
                        expHtml = `<div style="font-size:10px; color:#888; margin-top:4px;">Exp: ${expDate.toLocaleDateString('en-PH')}</div>`;
                    }
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${esc(u.email)}</td>
                    <td class="mono">${u.uid.substring(0, 14)}…</td>
                    <td id="tier-cell-${u.uid}">
                        <span class="badge ${isPaid ? 'b-paid' : 'b-free'}" id="badge-${u.uid}">${u.tier}</span>
                        ${isPaid ? expHtml : ''}
                    </td>
                    <td class="muted">${joined}</td>
                    <td><input class="note-input" id="note-${u.uid}" value="${esc(u.note || '')}" placeholder="e.g. GCash Jan 2025"></td>
                    <td class="acts">
                        <button class="btn-upgrade"   onclick="setTier('${u.uid}','paid')">▲ Upgrade</button>
                        <button class="btn-downgrade" onclick="setTier('${u.uid}','free')">▼ Downgrade</button>
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderTable(allUsers.filter(u => u.email.toLowerCase().includes(q)));
        }

        async function setTier(uid, tier) {
            const note = document.getElementById(`note-${uid}`)?.value || '';
            try {
                const resp = await fetch(`${API}/api/admin/set-tier`, {
                    method: 'POST',
                    headers: { 'x-admin-secret': SECRET, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid, tier, note })
                });
                const data = await resp.json();
                if (data.success) {
                    const badge = document.getElementById(`badge-${uid}`);
                    if (badge) { badge.className = `badge ${tier === 'paid' ? 'b-paid' : 'b-free'}`; badge.textContent = tier; }
                    const u = allUsers.find(x => x.uid === uid);
                    if (u) { u.tier = tier; u.note = note; }
                    updateStats();
                    showToast(tier === 'paid' ? '✅ Upgraded to Paid' : '🔒 Downgraded to Free');
                } else showToast('Error: ' + data.error);
            } catch (e) { showToast('Error: ' + e.message); }
        }

        /* --- INVITES LOGIC --- */
        function renderInvites(list) {
            const tbody = document.getElementById('inviteTable');
            tbody.innerHTML = '';
            list.forEach(i => {
                const created = i.createdAt ? new Date(i.createdAt).toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="mono fw-bold" style="${i.used ? 'text-decoration: line-through; color: #555;' : ''}">${i.code}</td>
                    <td><span class="badge ${i.used ? 'b-free' : 'b-paid'}">${i.used ? 'Used' : 'Available'}</span></td>
                    <td class="mono muted">${i.usedBy || '—'}</td>
                    <td class="muted">${created}</td>
                    <td class="acts">
                        <button class="${i.used ? 'btn-muted' : 'btn-upgrade'}" ${i.used ? 'disabled' : ''} onclick="copyCode('${i.code}')">
                            ${i.used ? 'N/A' : 'Copy'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterInvites() {
            const q = document.getElementById('searchInvites').value.toLowerCase();
            renderInvites(allInvites.filter(i => i.code.toLowerCase().includes(q) || i.usedBy.toLowerCase().includes(q)));
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code);
            showToast('📋 Copied: ' + code);
        }

        /* --- GLOBAL LOGIC --- */
        function doLogout() {
            API = ''; SECRET = ''; allUsers = []; allInvites = [];
            document.getElementById('mainSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminSecret').value = '';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2800);
        }

        function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    </script>
</body>

</html>
